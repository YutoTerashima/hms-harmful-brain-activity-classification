name: model1_effnet_spectrogram
description: EfficientNet-style spectrogram model using official and generated EEG spectrograms.
model:
  name: efficientnet_b0
  family: spectrogram
  in_channels: 1
  num_classes: 6
data:
  train_csv: data/raw/train.csv
  spectrogram_dir: data/raw/train_spectrograms
  generated_spectrogram_dir: data/interim/generated_eeg_spectrograms
  fold_column: fold
train:
  seed: 888
  epochs: 12
  batch_size: 32
  learning_rate: 0.0003
  image_size: [512, 512]
  target_type: soft_votes
output:
  oof_path: reports/results/model1_oof.csv
  test_path: reports/results/model1_test.csv
  checkpoint_dir: checkpoints/model1

