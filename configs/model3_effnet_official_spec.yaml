name: model3_effnet_official_spec
description: EfficientNet-style auxiliary model trained on official spectrogram features only.
model:
  name: efficientnet_b0
  family: spectrogram
  in_channels: 1
  num_classes: 6
data:
  train_csv: data/raw/train.csv
  spectrogram_dir: data/raw/train_spectrograms
  fold_column: fold
train:
  seed: 42
  epochs: 9
  batch_size: 16
  learning_rate: 0.0002
  image_size: [512, 512]
  target_type: soft_votes
output:
  oof_path: reports/results/model3_oof.csv
  test_path: reports/results/model3_test.csv
  checkpoint_dir: checkpoints/model3

